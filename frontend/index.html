<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Evaluaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: rgba(255,255,255,0.08);
    --accent: #5b8af5;
    --accent2: #7c5bf5;
    --success: #2ecc71;
    --danger: #e74c3c;
    --warning: #f39c12;
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #5a5f72;
    --radius: 14px;
    --glow: 0 0 40px rgba(91,138,245,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── TOP NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,20,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; gap: 0;
    height: 60px;
  }
  .nav-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 18px;
    color: var(--text);
    margin-right: auto;
    letter-spacing: -0.5px;
  }
  .nav-logo span { color: var(--accent); }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 6px 16px; border-radius: 8px;
    border: none; background: transparent;
    color: var(--text2); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all .2s;
  }
  .nav-tab:hover { color: var(--text); background: var(--surface); }
  .nav-tab.active { background: var(--accent); color: #fff; }
  .nav-status {
    margin-left: 20px; font-size: 12px; color: var(--text3);
    display: flex; align-items: center; gap: 6px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 8px var(--success);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── LAYOUT ── */
  main { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 32px; }
  .page-header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
  }
  .page-header p { color: var(--text2); margin-top: 6px; font-size: 15px; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color .2s, box-shadow .2s;
  }
  .card:hover { border-color: rgba(91,138,245,.3); box-shadow: var(--glow); }

  /* ── EXAM GRID ── */
  .exam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .exam-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px; cursor: pointer;
    transition: all .25s;
    position: relative; overflow: hidden;
  }
  .exam-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0; transition: opacity .25s;
  }
  .exam-card:hover { border-color: rgba(91,138,245,.4); transform: translateY(-2px); box-shadow: var(--glow); }
  .exam-card:hover::before { opacity: 1; }
  .exam-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .exam-card p { color: var(--text2); font-size: 13px; line-height: 1.5; }
  .exam-meta {
    display: flex; align-items: center; gap: 12px;
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .exam-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; letter-spacing: 0.5px;
    background: rgba(91,138,245,.15); color: var(--accent);
  }
  .exam-passing { font-size: 12px; color: var(--text3); margin-left: auto; }

  /* ── FORM ELEMENTS ── */
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; letter-spacing: 0.3px; }
  .field select, .field input {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 15px; padding: 12px 16px;
    border-radius: 10px; outline: none;
    transition: border-color .2s;
    appearance: none;
  }
  .field select:focus, .field input:focus { border-color: var(--accent); }

  /* ── QUIZ ── */
  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .quiz-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; }
  .quiz-progress-wrap { flex: 1; margin: 0 24px; }
  .quiz-progress-bar {
    height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .4s ease;
  }
  .quiz-counter { font-size: 13px; color: var(--text2); white-space: nowrap; margin-top: 6px; text-align: right; }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeSlide .3s ease;
  }
  @keyframes fadeSlide { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .question-num { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .question-text { font-size: 17px; font-weight: 500; line-height: 1.55; margin-bottom: 20px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer;
    transition: all .2s; font-size: 14px;
  }
  .option:hover { border-color: rgba(91,138,245,.4); background: rgba(91,138,245,.07); }
  .option.selected { border-color: var(--accent); background: rgba(91,138,245,.12); color: #fff; }
  .option-letter {
    width: 30px; height: 30px; min-width: 30px;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    background: var(--surface); border: 1px solid var(--border);
    transition: all .2s;
  }
  .option.selected .option-letter { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── BUTTONS ── */
  .btn {
    padding: 12px 28px; border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all .2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; box-shadow: 0 4px 20px rgba(91,138,245,.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(91,138,245,.45); }
  .btn-primary:active { transform: none; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-outline {
    background: transparent; border: 1px solid var(--border); color: var(--text2);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

  /* ── RESULT ── */
  #result-page { text-align: center; }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 56px 40px;
    max-width: 560px; margin: 0 auto;
    animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:none} }
  .result-icon { font-size: 64px; margin-bottom: 20px; }
  .result-score {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 72px; font-weight: 700; line-height: 1;
    margin-bottom: 8px;
  }
  .result-score.pass { color: var(--success); }
  .result-score.fail { color: var(--danger); }
  .result-status {
    font-size: 22px; font-weight: 600; margin-bottom: 8px;
  }
  .result-message { color: var(--text2); font-size: 15px; margin-bottom: 24px; }
  .result-meta {
    background: var(--surface2); border-radius: 12px; padding: 20px;
    margin-bottom: 28px; text-align: left;
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .result-meta-item label { font-size: 11px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; }
  .result-meta-item p { font-size: 15px; font-weight: 500; margin-top: 2px; }
  .email-note {
    background: rgba(91,138,245,.1); border: 1px solid rgba(91,138,245,.2);
    border-radius: 10px; padding: 12px 16px;
    font-size: 13px; color: var(--accent); margin-bottom: 20px;
  }

  /* ── GRADES TABLE ── */
  .grades-table {
    width: 100%; border-collapse: collapse;
    font-size: 14px;
  }
  .grades-table th {
    text-align: left; font-size: 11px; font-weight: 600;
    color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
  }
  .grades-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .grades-table tr:last-child td { border-bottom: none; }
  .grades-table tr:hover td { background: rgba(255,255,255,.02); }
  .grade-pill {
    display: inline-block; padding: 3px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .grade-pill.pass { background: rgba(46,204,113,.15); color: var(--success); }
  .grade-pill.fail { background: rgba(231,76,60,.15); color: var(--danger); }

  /* ── LOADING ── */
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--surface2);
    border-top-color: var(--accent);
    animation: spin .8s linear infinite;
    margin: 40px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 32px; right: 32px; z-index: 999;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 20px;
    font-size: 14px; color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    transform: translateY(80px); opacity: 0;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
    max-width: 340px;
  }
  #toast.show { transform: none; opacity: 1; }
  #toast.error { border-color: rgba(231,76,60,.4); color: #ff6b6b; }

  /* ── ARCH DIAGRAM INFO ── */
  .arch-info {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px;
    margin-bottom: 24px; font-size: 13px;
    display: flex; gap: 32px; flex-wrap: wrap;
  }
  .arch-item { display: flex; align-items: center; gap: 10px; }
  .arch-dot { width: 8px; height: 8px; border-radius: 50%; }
  .arch-label { color: var(--text2); }
  .arch-val { font-weight: 600; color: var(--text); margin-left: 4px; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text3);
  }
  .empty-state svg { margin-bottom: 16px; opacity: .4; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Eval<span>.</span>System</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('home')">Inicio</button>
    <button class="nav-tab" onclick="showPage('exam')">Presentar Examen</button>
    <button class="nav-tab" onclick="showPage('grades')">Historial</button>
  </div>
  <div class="nav-status">
    <span class="status-dot"></span>
    <span id="conn-status">Conectado</span>
  </div>
</nav>

<main>

  <!-- ══ HOME ══ -->
  <div id="home" class="page active">
    <div class="page-header">
      <h1>Exámenes Disponibles</h1>
      <p>Selecciona un examen para comenzar tu evaluación</p>
    </div>

    <div class="arch-info">
      <div class="arch-item">
        <div class="arch-dot" style="background:#5b8af5"></div>
        <span class="arch-label">WildFly 1<span class="arch-val">Lógica</span></span>
      </div>
      <div class="arch-item">
        <div class="arch-dot" style="background:#7c5bf5"></div>
        <span class="arch-label">WildFly 2<span class="arch-val">Datos + Consumer</span></span>
      </div>
      <div class="arch-item">
        <div class="arch-dot" style="background:#f39c12"></div>
        <span class="arch-label">RabbitMQ<span class="arch-val">AMQP</span></span>
      </div>
      <div class="arch-item">
        <div class="arch-dot" style="background:#2ecc71"></div>
        <span class="arch-label">Hibernate JPA<span class="arch-val">2 DB</span></span>
      </div>
    </div>

    <div id="exams-grid" class="exam-grid">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- ══ EXAM ══ -->
  <div id="exam" class="page">
    <div class="page-header">
      <h1 id="exam-title">Cargando...</h1>
      <p id="exam-desc"></p>
    </div>

    <!-- Step 1: Select student -->
    <div id="step-student">
      <div class="card" style="max-width:480px">
        <div class="field">
          <label>IDENTIFICACIÓN DEL ESTUDIANTE</label>
          <select id="student-select">
            <option value="">Selecciona tu nombre...</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="startQuiz()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          Comenzar Examen
        </button>
      </div>
    </div>

    <!-- Step 2: Quiz -->
    <div id="step-quiz" style="display:none">
      <div class="quiz-header">
        <div class="quiz-title" id="quiz-exam-name"></div>
        <div class="quiz-progress-wrap">
          <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="quiz-counter" id="quiz-counter"></div>
        </div>
      </div>
      <div id="questions-container"></div>
      <div class="btn-actions">
        <button class="btn btn-outline" onclick="showPage('home')">Cancelar</button>
        <button class="btn btn-primary" id="submit-btn" onclick="submitExam()">
          Entregar Examen
        </button>
      </div>
    </div>
  </div>

  <!-- ══ GRADES ══ -->
  <div id="grades" class="page">
    <div class="page-header">
      <h1>Historial de Notas</h1>
      <p>Consulta el resultado de tus evaluaciones</p>
    </div>
    <div class="card" style="max-width:400px;margin-bottom:24px">
      <div class="field" style="margin-bottom:0">
        <label>ESTUDIANTE</label>
        <select id="grades-student-select" onchange="loadGrades()">
          <option value="">Selecciona un estudiante...</option>
        </select>
      </div>
    </div>
    <div id="grades-content">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <p>Selecciona un estudiante para ver su historial</p>
      </div>
    </div>
  </div>

  <!-- ══ RESULT ══ -->
  <div id="result-page" class="page">
    <div class="result-card" id="result-card"></div>
  </div>

</main>

<div id="toast"></div>

<script>
const API = '/api/exams';
let currentExam = null;
let currentStudentId = null;
let selectedAnswers = {};

// ── Navigation ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id === 'result-page' ? 'result-page' : id).classList.add('active');
  const idx = {home:0,exam:1,grades:2};
  if (idx[id] !== undefined) document.querySelectorAll('.nav-tab')[idx[id]].classList.add('active');
}

// ── Toast ──
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3500);
}

// ── Load exams list ──
async function loadExams() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('Error ' + res.status);
    const exams = await res.json();
    const grid = document.getElementById('exams-grid');
    if (!exams.length) {
      grid.innerHTML = '<div class="empty-state"><p>No hay exámenes disponibles</p></div>';
      return;
    }
    grid.innerHTML = exams.map(e => `
      <div class="exam-card" onclick="openExam(${e.id})">
        <h3>${e.title}</h3>
        <p>${e.description || 'Sin descripción'}</p>
        <div class="exam-meta">
          <span class="exam-badge">${(e.questions||[]).length} preguntas</span>
          <span class="exam-passing">Mínimo: ${e.passingScore}%</span>
        </div>
      </div>`).join('');
  } catch (err) {
    document.getElementById('exams-grid').innerHTML =
      `<div class="empty-state"><p>No se pudo conectar al servidor.<br><small>${err.message}</small></p></div>`;
    toast('Sin conexión al servidor WildFly', 'error');
    document.getElementById('conn-status').textContent = 'Sin conexión';
  }
}

// ── Load students ──
async function loadStudents() {
  try {
    const res = await fetch(API + '/students/all');
    const students = await res.json();
    ['student-select', 'grades-student-select'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = '<option value="">Selecciona...</option>' +
        students.map(s => `<option value="${s.id}">${s.firstName} ${s.lastName} (${s.studentCode})</option>`).join('');
    });
  } catch (e) { console.warn('No se pudo cargar estudiantes', e); }
}

// ── Open exam ──
async function openExam(examId) {
  try {
    showPage('exam');
    document.getElementById('exam-title').textContent = 'Cargando...';
    const res = await fetch(`${API}/${examId}`);
    currentExam = await res.json();
    document.getElementById('exam-title').textContent = currentExam.title;
    document.getElementById('exam-desc').textContent = currentExam.description || '';
    document.getElementById('step-student').style.display = '';
    document.getElementById('step-quiz').style.display = 'none';
    selectedAnswers = {};
  } catch (e) { toast('Error cargando examen', 'error'); }
}

// ── Start quiz ──
function startQuiz() {
  currentStudentId = document.getElementById('student-select').value;
  if (!currentStudentId) { toast('Selecciona un estudiante primero'); return; }
  if (!currentExam?.questions?.length) { toast('El examen no tiene preguntas', 'error'); return; }

  document.getElementById('step-student').style.display = 'none';
  document.getElementById('step-quiz').style.display = '';
  document.getElementById('quiz-exam-name').textContent = currentExam.title;
  renderQuestions();
}

// ── Render questions ──
function renderQuestions() {
  const letters = ['A','B','C','D','E'];
  const qs = currentExam.questions;
  updateProgress();

  document.getElementById('questions-container').innerHTML = qs.map((q, qi) => `
    <div class="question-card">
      <div class="question-num">Pregunta ${qi + 1} de ${qs.length}</div>
      <div class="question-text">${q.questionText}</div>
      <div class="options">
        ${(q.options||[]).map((o, oi) => `
          <div class="option ${selectedAnswers[q.id] == o.id ? 'selected' : ''}"
               onclick="selectAnswer(${q.id}, ${o.id}, this)">
            <span class="option-letter">${letters[oi]||oi+1}</span>
            <span>${o.optionText}</span>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function selectAnswer(questionId, optionId, el) {
  selectedAnswers[questionId] = optionId;
  // Update UI
  el.closest('.options').querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  updateProgress();
}

function updateProgress() {
  const total = currentExam.questions.length;
  const answered = Object.keys(selectedAnswers).length;
  const pct = (answered / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('quiz-counter').textContent = `${answered} / ${total} respondidas`;
  document.getElementById('submit-btn').disabled = answered < total;
}

// ── Submit exam ──
async function submitExam() {
  const unanswered = currentExam.questions.length - Object.keys(selectedAnswers).length;
  if (unanswered > 0) {
    toast(`Faltan ${unanswered} preguntas por responder`, 'error');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    const res = await fetch(`${API}/${currentExam.id}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        studentId: parseInt(currentStudentId),
        answers: selectedAnswers
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error del servidor');
    showResult(data);

  } catch (e) {
    toast('Error enviando examen: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Entregar Examen';
  }
}

// ── Show result ──
function showResult(data) {
  const passed = data.passed;
  const score = Math.round(data.score * 10) / 10;

  document.getElementById('result-card').innerHTML = `
    <div class="result-icon">${passed ? '🎉' : '📚'}</div>
    <div class="result-score ${passed ? 'pass' : 'fail'}">${score}%</div>
    <div class="result-status">${passed ? '¡Examen Aprobado!' : 'No Aprobado'}</div>
    <div class="result-message">${data.message}</div>
    <div class="result-meta">
      <div class="result-meta-item">
        <label>ESTUDIANTE</label>
        <p>${data.studentName}</p>
      </div>
      <div class="result-meta-item">
        <label>EXAMEN</label>
        <p>${data.examTitle}</p>
      </div>
      <div class="result-meta-item">
        <label>PUNTAJE OBTENIDO</label>
        <p>${score}%</p>
      </div>
      <div class="result-meta-item">
        <label>PUNTAJE MÍNIMO</label>
        <p>${data.passingScore}%</p>
      </div>
    </div>
    <div class="email-note">
      📧 Se enviará un correo automático a tu cuenta con los resultados vía RabbitMQ
    </div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="btn btn-outline" onclick="showPage('home')">Ver más exámenes</button>
      <button class="btn btn-primary" onclick="showPage('grades')">Ver historial</button>
    </div>`;

  showPage('result-page');
}

// ── Load grades ──
async function loadGrades() {
  const studentId = document.getElementById('grades-student-select').value;
  if (!studentId) return;

  document.getElementById('grades-content').innerHTML = '<div class="spinner"></div>';
  try {
    const res = await fetch(`${API}/students/${studentId}/grades`);
    const grades = await res.json();

    if (!grades.length) {
      document.getElementById('grades-content').innerHTML =
        '<div class="empty-state"><p>Este estudiante aún no tiene evaluaciones</p></div>';
      return;
    }

    document.getElementById('grades-content').innerHTML = `
      <div class="card" style="padding:0;overflow:hidden">
        <table class="grades-table">
          <thead>
            <tr>
              <th>ID Examen</th>
              <th>Puntaje</th>
              <th>Estado</th>
              <th>Email</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody>
            ${grades.map(g => `
              <tr>
                <td>#${g.examId}</td>
                <td><strong>${Math.round(g.score * 10) / 10}%</strong></td>
                <td><span class="grade-pill ${g.passed ? 'pass' : 'fail'}">${g.passed ? 'Aprobado' : 'Reprobado'}</span></td>
                <td>${g.emailSent
                  ? '<span style="color:var(--success);font-size:13px">✓ Enviado</span>'
                  : '<span style="color:var(--text3);font-size:13px">Pendiente</span>'}</td>
                <td style="color:var(--text2);font-size:13px">${new Date(g.gradedAt).toLocaleString('es-CO')}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch (e) {
    document.getElementById('grades-content').innerHTML =
      '<div class="empty-state"><p>Error cargando historial</p></div>';
  }
}

// ── Init ──
loadExams();
loadStudents();
</script>
